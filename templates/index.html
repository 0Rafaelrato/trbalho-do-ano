<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="card">
        <h1>Cadastro de Usuário</h1>
        <p>Salvar Nome, E-mail e senha no MySQL com validação.</p>

        <a href="/perfil">Ver Perfil</a>

        <form id="form" action="/register" method="POST">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: João Paulo" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Ex: email@gmail.com" required>
    
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="Min 8, com letras e números" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="CPF" placeholder="Digite seu CPF" required>

            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="Endereço" placeholder="Ex: Quadra 10 Lote 20" required>

            <label for="estado">Estado</label>
            <select id="estado" name="estado" required>
                <option value="" disabled selected>Selecione seu Estado</option>
                <option value="AC">AC</option>
                <option value="AL">AL</option>
                <option value="AP">AP</option>
                <option value="AM">AM</option>
                <option value="BA">BA</option>
                <option value="CE">CE</option>
                <option value="DF">DF</option>
                <option value="ES">ES</option>
                <option value="GO">GO</option>
                <option value="MA">MA</option>
                <option value="MT">MT</option>
                <option value="MS">MS</option>
                <option value="MG">MG</option>
                <option value="PA">PA</option>
                <option value="PB">PB</option>
                <option value="PR">PR</option>
                <option value="PE">PE</option>
                <option value="PI">PI</option>
                <option value="RJ">RJ</option>
                <option value="RN">RN</option>
                <option value="RS">RS</option>
                <option value="RO">RO</option>
                <option value="RR">RR</option>
                <option value="SC">SC</option>
                <option value="SP">SP</option>
                <option value="SE">SE</option>
                <option value="TO">TO</option>
            </select>

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" name="Cidade" placeholder="Digite o nome da sua cidade" required>
    
            <button type="submit">Cadastro</button>
        </form>

        <div id="msg" class="msg" style="display: none;"></div>
        <ul id="regras"></ul>
    </main>

    <script src="{{ url_for('static', filename='js/function.js') }}"></script>
</body>
</html>
